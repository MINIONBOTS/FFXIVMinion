name: Verify .gitignore allowlist

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify-gitignore:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate allowlist
        shell: pwsh
        run: ./scripts/update-gitignore-allowlist.ps1

      - name: Fail if .gitignore is out of sync
        shell: pwsh
        run: |
          git diff -- .gitignore
          if (-not [string]::IsNullOrWhiteSpace((git status --porcelain -- .gitignore))) {
            Write-Error ".gitignore is out of sync. Run ./scripts/update-gitignore-allowlist.ps1 and commit the result."
          }
